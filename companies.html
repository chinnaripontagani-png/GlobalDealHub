<!DOCTYPE html>
<html>
<head>
<title>GlobalDealHub - Companies</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 Global Company Discovery</h1>

<h2>Add Your Company</h2>

<input id="companyName" placeholder="Company Name">
<br><br>

<input id="industry" placeholder="Industry (AI, Fintech, Healthcare)">
<br><br>

<input id="country" placeholder="Country">
<br><br>

<input id="funding" placeholder="Funding Needed ($)">
<br><br>

<button onclick="addCompany()">Add Company</button>

<hr>

<h2>Search Companies</h2>

<input id="search" placeholder="Search company, industry, country">
<button onclick="searchCompanies()">Search</button>

<hr>

<h2>Companies on GlobalDealHub</h2>

<div id="companyList"></div>

<script src="script.js"></script>

</body>
</html>
