<!DOCTYPE html>
<html>
<head>
<title>Companies - GlobalDealHub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 Discover Companies</h1>

<button onclick="connectCompany('Microsoft')">Connect</button>
</div>

<div class="company-card">
<h3>Google</h3>
<p>AI & Search Engine</p>
<button onclick="connectCompany('Google')">Connect</button>
</div>

<div class="company-card">
<h3>Amazon</h3>
<p>E-commerce Platform</p>
<button onclick="connectCompany('Amazon')">Connect</button>
</div>

<div class="company-card">
<h3>Tesla</h3>
<p>Electric Vehicles</p>
<button onclick="connectCompany('Tesla')">Connect</button>
</div>

<div class="company-card">
<h3>Apple</h3>
<p>Consumer Technology</p>
<button onclick="connectCompany('Apple')">Connect</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
